<!DOCTYPE html>
<html lang="en">
<head>
<script>
    if(localStorage.getItem('scholar-theme')==='light') {
        document.documentElement.setAttribute('data-theme','light');
    }
</script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - GuruAI</title>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>

<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    background: '#0d0d0f',
                    surface: '#131315',
                    'surface-container': '#1a1a1d',
                    'on-surface': '#f6f3f5',
                    'on-surface-variant': '#a8a0b0',
                    primary: '#d095ff',
                    error: '#ffb4ab',
                },
                fontFamily: {
                    body: ['Inter', 'sans-serif'],
                    headline: ['Plus Jakarta Sans', 'sans-serif'],
                }
            }
        }
    }
</script>

<style>
    body { font-family: 'Inter', sans-serif; background-color: #0d0d0f; color: #f6f3f5; margin: 0; min-height: 100vh; overflow-x: hidden; }
    .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    /* ── Animated Background Orbs ── */
    .bg-orb-1 {
        position: fixed; top: -10%; left: -5%; width: 50vw; height: 50vw;
        background: radial-gradient(circle, rgba(208,149,255,0.12) 0%, rgba(0,0,0,0) 65%);
        border-radius: 50%; filter: blur(80px); z-index: -1; pointer-events: none;
        animation: floatOrb1 18s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
        position: fixed; bottom: -15%; right: -10%; width: 60vw; height: 60vw;
        background: radial-gradient(circle, rgba(0,227,253,0.08) 0%, rgba(0,0,0,0) 65%);
        border-radius: 50%; filter: blur(90px); z-index: -1; pointer-events: none;
        animation: floatOrb2 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes floatOrb1 { 
        0% { transform: translate(0, 0) scale(1); } 
        100% { transform: translate(40px, 60px) scale(1.1); } 
    }
    @keyframes floatOrb2 { 
        0% { transform: translate(0, 0) scale(1); } 
        100% { transform: translate(-50px, -70px) scale(1.15); } 
    }

    html[data-theme="light"] .bg-orb-1 { background: radial-gradient(circle, rgba(208,149,255,0.30) 0%, rgba(255,255,255,0) 65%); }
    html[data-theme="light"] .bg-orb-2 { background: radial-gradient(circle, rgba(0,227,253,0.20) 0%, rgba(255,255,255,0) 65%); }
    
    /* LIGHT MODE CORE */
    html[data-theme="light"] { color-scheme: light; }
    html[data-theme="light"] body { background-color: #f4effa !important; color: #1a1126 !important; }
    html[data-theme="light"] .font-headline { color: #1a1126 !important; }
    html[data-theme="light"] .text-on-surface-variant { color: #6b5a8a !important; }
    
    /* Glass card */
    .login-card {
        background: rgba(26,26,29,0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
        transition: all 0.3s ease;
    }
    .login-card:hover { border-color: rgba(208,149,255,0.25); box-shadow: 0 24px 48px rgba(0,0,0,0.5), 0 0 30px rgba(208,149,255,0.05); }
    html[data-theme="light"] .login-card {
        background: rgba(255,255,255,0.85) !important; border-color: rgba(208,149,255,0.25) !important;
        box-shadow: 0 20px 40px rgba(112,32,200,0.08), inset 0 1px 0 #fff !important;
    }
    html[data-theme="light"] .login-card:hover { border-color: rgba(112,32,200,0.35) !important; box-shadow: 0 24px 48px rgba(112,32,200,0.12) !important; }

    /* Inputs */
    .input-field {
        background: rgba(19,19,21,0.6); border: 1px solid rgba(255,255,255,0.08); color: #fff;
        transition: all 0.25s ease;
    }
    .input-field:focus { border-color: #d095ff; background: rgba(19,19,21,0.9); box-shadow: 0 0 0 2px rgba(208,149,255,0.2); outline: none; }
    html[data-theme="light"] .input-field {
        background: #fff !important; border-color: rgba(208,149,255,0.3) !important; color: #1a1126 !important;
    }
    html[data-theme="light"] .input-field:focus {
        border-color: #7020c8 !important; box-shadow: 0 0 0 2px rgba(112,32,200,0.15) !important;
    }

    /* Buttons */
    .btn-submit {
        background: linear-gradient(135deg, #d095ff, #ae3ceb); color: #fff; font-weight: 700;
        box-shadow: 0 4px 16px rgba(208,149,255,0.25); transition: all 0.25s ease;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(208,149,255,0.35); }
    .btn-submit:active { transform: translateY(0); }
    html[data-theme="light"] .btn-submit {
        background: linear-gradient(135deg, #8b2ff8, #6a10e0) !important;
        box-shadow: 0 4px 16px rgba(112,32,200,0.2) !important;
    }
    html[data-theme="light"] .btn-submit:hover { box-shadow: 0 6px 20px rgba(112,32,200,0.3) !important; }

    /* Theme Toggle */
    #theme-toggle-login {
        width: 38px; height: 38px; border-radius: 50%; border: 2px solid rgba(208,149,255,0.30);
        background: rgba(208,149,255,0.10); color: #c57eff; cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: all 0.22s ease; backdrop-filter: blur(10px);
    }
    #theme-toggle-login:hover {
        background: rgba(208,149,255,0.25); border-color: #d095ff; color: #e0b0ff; transform: rotate(15deg) scale(1.08); box-shadow: 0 0 16px rgba(208,149,255,0.4);
    }
    html[data-theme="light"] #theme-toggle-login { border-color: rgba(100,30,200,0.30); background: rgba(100,30,200,0.08); color: #6010b8; }
    html[data-theme="light"] #theme-toggle-login:hover { background: rgba(100,30,200,0.16); border-color: #7020c8; color: #5000a0; box-shadow: 0 0 16px rgba(100,30,200,0.25); }
</style>
</head>

<body class="flex flex-col min-h-screen relative">
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>

    <!-- Header / Theme Toggle -->
    <header class="w-full flex items-center justify-between px-8 py-4 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#d095ff] to-[#c782ff] flex items-center justify-center shadow-lg shadow-[#d095ff]/20">
                <span class="material-symbols-outlined text-black text-sm" style="font-variation-settings:'FILL' 1">auto_stories</span>
            </div>
            <span class="font-headline font-bold text-lg text-white">GuruAI</span>
        </div>
        <button id="theme-toggle-login" onclick="toggleThemeLogin()" title="Toggle theme">
            <span id="theme-icon-login" class="material-symbols-outlined">dark_mode</span>
        </button>
    </header>

    <!-- Main Container -->
    <main class="flex-1 flex items-center justify-center px-4 py-8 relative z-10">
        <div class="login-card w-full max-w-md rounded-[2.5rem] p-8 md:p-10 flex flex-col">
            
            <!-- Branding -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold font-headline text-white tracking-tight">Welcome to GuruAI</h1>
                <p id="sub-title" class="text-on-surface-variant text-sm mt-2">Log in to your personalized tutoring dashboard</p>
            </div>

            <!-- Tab Navigation -->
            <div class="flex bg-black/30 p-1.5 rounded-2xl mb-8 relative z-10">
                <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-primary transition-all">Log In</button>
                <button id="tab-register" onclick="switchTab('signup')" class="flex-1 py-2.5 rounded-xl text-sm font-medium text-on-surface-variant/70 hover:text-on-surface transition-all">Sign Up</button>
            </div>

            <!-- Form -->
            <form id="auth-form" onsubmit="handleSubmit(event)" class="flex flex-col gap-5">
                <div>
                    <label id="label-user" class="text-[10px] font-bold uppercase tracking-widest text-primary mb-2 block ml-1">Username</label>
                    <input id="input-username" type="text" required placeholder="Enter username..."
                        class="input-field w-full rounded-2xl px-5 py-3.5 text-base" />
                </div>
                <div>
                    <label id="label-pass" class="text-[10px] font-bold uppercase tracking-widest text-primary mb-2 block ml-1">Password</label>
                    <input id="input-password" type="password" required placeholder="Enter password..."
                        class="input-field w-full rounded-2xl px-5 py-3.5 text-base" />
                </div>
                
                <!-- Display Name (Signup state only) -->
                <div id="signup-extra" class="hidden flex-col gap-5">
                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-primary mb-2 block ml-1">Display Name</label>
                        <input id="input-displayname" type="text" placeholder="e.g. Alex"
                            class="input-field w-full rounded-2xl px-5 py-3.5 text-base" />
                    </div>
                </div>

                <div id="error-message" class="text-red-400 text-xs font-semibold text-center mt-1 hidden"></div>

                <button type="submit" id="btn-text" class="btn-submit w-full py-4 rounded-2xl mt-4 text-base active:scale-[0.98] transition-transform">
                    Log In
                </button>
            </form>
        </div>
    </main>

    <footer class="w-full text-center py-6 text-[11px] text-on-surface-variant/40 relative z-10 border-t border-white/5">
        GuruAI &copy; 2026. Your Context-Aware Adaptive Tutoring Companion.
    </footer>

    <script>
        let currentState = 'login'; // or 'signup'

        function toggleThemeLogin() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            if (isLight) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('scholar-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('scholar-theme', 'light');
            }
            applyThemeIcon();
        }

        function applyThemeIcon() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const icon = document.getElementById('theme-icon-login');
            if (icon) {
                icon.textContent = isLight ? 'wb_sunny' : 'dark_mode';
            }
        }

        function switchTab(state) {
            currentState = state;
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const signupExtra = document.getElementById('signup-extra');
            const subTitle = document.getElementById('sub-title');
            const btnText = document.getElementById('btn-text');
            const errMsg = document.getElementById('error-message');

            errMsg.classList.add('hidden');

            if (state === 'login') {
                tabLogin.className = "flex-1 py-2.5 rounded-xl text-sm font-bold text-primary transition-all bg-white/5 shadow-inner shadow-white/5";
                tabRegister.className = "flex-1 py-2.5 rounded-xl text-sm font-medium text-on-surface-variant/70 hover:text-on-surface transition-all";
                signupExtra.classList.add('hidden');
                subTitle.textContent = "Log in to your personalized tutoring dashboard";
                btnText.textContent = "Log In";
            } else {
                tabRegister.className = "flex-1 py-2.5 rounded-xl text-sm font-bold text-primary transition-all bg-white/5 shadow-inner shadow-white/5";
                tabLogin.className = "flex-1 py-2.5 rounded-xl text-sm font-medium text-on-surface-variant/70 hover:text-on-surface transition-all";
                signupExtra.classList.remove('hidden');
                signupExtra.classList.add('flex');
                subTitle.textContent = "Create an account to start studying with AI";
                btnText.textContent = "Create Account";
            }
            
            // Adjust colors for light/dark active tab
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            if (isLight) {
                tabLogin.classList.remove('bg-white/5', 'shadow-white/5');
                tabRegister.classList.remove('bg-white/5', 'shadow-white/5');
                if (state === 'login') {
                    tabLogin.classList.add('bg-black/5');
                } else {
                    tabRegister.classList.add('bg-black/5');
                }
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('input-username');
            const passwordInput = document.getElementById('input-password');
            const displayNameInput = document.getElementById('input-displayname');
            const errMsg = document.getElementById('error-message');
            
            errMsg.classList.add('hidden');
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const displayName = displayNameInput.value.trim() || username;

            const endpoint = currentState === 'login' ? '/api/auth/login' : '/api/auth/register';
            const bodyData = currentState === 'login' 
                ? { username, password }
                : { username, password, name: displayName };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                
                const data = await res.json();
                if (res.ok) {
                    // Success! Redirect to home page
                    window.location.href = '/index.html';
                } else {
                    errMsg.textContent = data.detail || 'An error occurred during authentication.';
                    errMsg.classList.remove('hidden');
                }
            } catch (err) {
                errMsg.textContent = 'Failed to connect to authentication server.';
                errMsg.classList.remove('hidden');
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            applyThemeIcon();
            switchTab('login');
        });
    </script>
</body>
</html>
