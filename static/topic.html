    <style>

        /* Quiz styles */
        .quiz-option {
            display: block; width: 100%; text-align: left;
            padding: 0.7rem 1rem; margin: 0.35rem 0;
            background: #1f1f22; border: 1px solid #48474a;
            border-radius: 0.6rem; color: #f6f3f5;

        .quiz-option.correct { background: rgba(63,255,139,0.12); border-color: #24f07e; color: #24f07e; }
        .quiz-option.wrong { background: rgba(255,110,132,0.12); border-color: #ff6e84; color: #ff6e84; }

        /* Skeleton loader */
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .skeleton { background: linear-gradient(90deg, #1f1f22 25%, #262528 50%, #1f1f22 75%); background-size: 1000px 100%; animation: shimmer 2s infinite; border-radius: 0.5rem; }

<body class="bg-background text-on-surface font-body min-h-screen">

            <a href="/knowledge.html" class="w-9 h-9 rounded-full bg-surface-container-high hover:bg-surface-bright flex items-center justify-center transition-colors text-on-surface-variant hover:text-on-surface">

<script>
    const API = "";
    const params = new URLSearchParams(window.location.search);
    const TOPIC   = params.get("topic")   || "Unknown Topic";
    const SUBJECT = params.get("subject") || "General";
    const LEVEL   = params.get("level")   || "average";
    const SCORE   = parseInt(params.get("score") || "50", 10);

    const SESSION_ID = null; // topic quizzes track globally via session stored in URL later

    const LEVEL_META = {
        strong:  { label: "Mastery · Strong",  badgeClass: "badge-strong",  hint: "You know this well — here's a crisp, advanced breakdown.", icon: "verified",    color: "tertiary" },
        average: { label: "Mastery · Average", badgeClass: "badge-average", hint: "Solid foundation — let's sharpen the edges.",             icon: "trending_up", color: "secondary" },
        weak:    { label: "Needs Work · Weak", badgeClass: "badge-weak",    hint: "Let's build this up from the ground — step by step.",     icon: "warning",     color: "error" },
    };
    const meta = LEVEL_META[LEVEL] || LEVEL_META.average;

    // Populate header + hero
    document.getElementById("header-subject").textContent = SUBJECT;
    document.getElementById("header-topic").textContent = TOPIC;
    document.getElementById("topic-subject-label").textContent = SUBJECT;
    document.getElementById("topic-title").textContent = TOPIC;
    document.getElementById("topic-level-hint").textContent = meta.hint;
    document.title = `${TOPIC} — The Illuminated Scholar`;

    const badge = document.getElementById("level-badge");
    badge.textContent = meta.label;
    badge.className = `px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${meta.badgeClass}`;

    // Load explanation
    async function loadExplanation() {
        try {
            const res = await fetch(`${API}/api/topic/explain`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic: TOPIC, subject: SUBJECT, mastery_level: LEVEL, score_pct: SCORE }),
            }).then(r => r.json());

            document.getElementById("explanation-skeleton").classList.add("hidden");
            const content = document.getElementById("explanation-content");
            content.classList.remove("hidden");
            content.innerHTML = marked.parse(res.explanation || "No explanation returned.");
        } catch (e) {
            document.getElementById("explanation-skeleton").classList.add("hidden");
            const content = document.getElementById("explanation-content");
            content.classList.remove("hidden");
            content.innerHTML = `<p class="text-error">Failed to generate explanation. Please try refreshing.</p>`;
        }
    }

    // Quiz state
    let currentQuiz = null;
    let answeredCount = 0;
    let correctCount = 0;

    async function generateQuiz() {
        document.getElementById("quiz-hint").classList.add("hidden");
        document.getElementById("quiz-result").classList.add("hidden");
        const container = document.getElementById("quiz-container");
        container.classList.remove("hidden");
        container.innerHTML = `
            <div class="space-y-4">
                ${[1,2,3,4].map(() => `
                    <div class="bg-surface-container-low border border-outline-variant/10 rounded-2xl p-6 space-y-3">
                        <div class="skeleton h-4 w-3/4"></div>
                        <div class="skeleton h-10 w-full"></div>
                        <div class="skeleton h-10 w-full"></div>
                        <div class="skeleton h-10 w-full"></div>
                        <div class="skeleton h-10 w-full"></div>
                    </div>`).join("")}
            </div>`;

        const btn = document.getElementById("generate-quiz-btn");
        btn.disabled = true;
        btn.innerHTML = `<span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span> Generating...`;

        try {
            const quiz = await fetch(`${API}/api/topic/quiz`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic: TOPIC, subject: SUBJECT, mastery_level: LEVEL, score_pct: SCORE }),
            }).then(r => r.json());

            currentQuiz = quiz;
            answeredCount = 0;
            correctCount = 0;
            renderQuiz(quiz);
        } catch (e) {
            container.innerHTML = `<p class="text-error text-sm text-center p-4">Failed to generate quiz. Please try again.</p>`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<span class="material-symbols-outlined text-[18px]">refresh</span> Generate Quiz`;
        }
    }

    function renderQuiz(quiz) {
        const container = document.getElementById("quiz-container");
        container.innerHTML = "";
        if (!quiz.questions || quiz.questions.length === 0) {
            container.innerHTML = `<p class="text-error text-sm text-center p-4">No questions generated.</p>`;
            return;
        }
        quiz.questions.forEach((q, i) => {
            const block = document.createElement("div");
            block.className = "bg-surface-container-low border border-outline-variant/10 rounded-2xl p-6";
            block.innerHTML = `<p class="font-bold text-on-surface mb-4 leading-relaxed">Q${i + 1}. ${q.question}</p>`;

            q.options.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "quiz-option";
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(q, idx, btn, block);
                block.appendChild(btn);
            });
            container.appendChild(block);
        });
    }

    function handleAnswer(q, selectedIdx, btn, block) {
        block.querySelectorAll(".quiz-option").forEach(b => b.disabled = true);
        const isCorrect = selectedIdx === q.correct_index;
        btn.classList.add(isCorrect ? "correct" : "wrong");
        block.querySelectorAll(".quiz-option")[q.correct_index].classList.add("correct");

        const exp = document.createElement("p");
        exp.className = "quiz-explanation";
        exp.textContent = q.explanation;
        block.appendChild(exp);

        if (isCorrect) correctCount++;
        answeredCount++;

        // Record score to backend
        const sessionId = getSessionId();
        if (sessionId) {
            fetch(`${API}/api/quiz/answer`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: sessionId, subject: SUBJECT, topic: TOPIC, is_correct: isCorrect }),
            }).catch(() => {});
        }

        // Show result after last question
        if (currentQuiz && answeredCount === currentQuiz.questions.length) {
            showResult(correctCount, currentQuiz.questions.length);
        }
    }

    function showResult(correct, total) {
        const pct = Math.round((correct / total) * 100);
        const resultEl = document.getElementById("quiz-result");
        const textEl = document.getElementById("result-text");
        const subEl = document.getElementById("result-subtext");

        resultEl.classList.remove("hidden", "border-tertiary/20", "border-error/20", "border-secondary/20", "bg-tertiary/5", "bg-error/5", "bg-secondary/5");

        if (pct >= 75) {
            textEl.textContent = `🎉 Excellent! ${correct}/${total} correct`;
            subEl.textContent = "Your mastery score for this topic has been updated.";
            resultEl.classList.add("border-tertiary/20", "bg-tertiary/5");
            textEl.className = "text-lg font-bold text-tertiary";
        } else if (pct >= 50) {
            textEl.textContent = `📈 Good effort! ${correct}/${total} correct`;
            subEl.textContent = "Keep practicing — you're getting there.";
            resultEl.classList.add("border-secondary/20", "bg-secondary/5");
            textEl.className = "text-lg font-bold text-secondary";
        } else {
            textEl.textContent = `📚 Keep at it! ${correct}/${total} correct`;
            subEl.textContent = "Review the explanation above and try again.";
            resultEl.classList.add("border-error/20", "bg-error/5");
            textEl.className = "text-lg font-bold text-error";
        }
    }

    function getSessionId() {
        return localStorage.getItem("lastSessionId") || null;
    }

    // Boot
    loadExplanation();

    // Theme toggle
    function _tPatch(isLight) {
        document.querySelectorAll('aside').forEach(el => { el.style.backgroundColor = isLight ? '#e8e0f5' : ''; });
        document.querySelectorAll('header').forEach(el => { el.style.backgroundColor = isLight ? 'rgba(232,224,245,0.97)' : ''; });
        document.querySelectorAll('[class*="bg-[#131315]"]').forEach(el => { el.style.backgroundColor = isLight ? '#e8e0f5' : ''; });
        document.querySelectorAll('[class*="bg-[#0e0e10]"]').forEach(el => { el.style.backgroundColor = isLight ? 'rgba(232,224,245,0.97)' : ''; });
        document.querySelectorAll('[class*="text-[#f6f3f5]"]').forEach(el => { el.style.color = isLight ? '#2d2140' : ''; });
        document.querySelectorAll('[class*="text-[#f6f3f5]/"]').forEach(el => { el.style.color = isLight ? '#6a5a8a' : ''; });
        const icon = document.getElementById('theme-icon-t');
        if (icon) icon.textContent = isLight ? 'wb_sunny' : 'dark_mode';
    }
    function toggleThemeT() {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        if (isLight) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('scholar-theme','dark'); _tPatch(false); }
        else { document.documentElement.setAttribute('data-theme','light'); localStorage.setItem('scholar-theme','light'); _tPatch(true); }
    }
    document.addEventListener('DOMContentLoaded', function() { _tPatch(document.documentElement.getAttribute('data-theme')==='light'); });
</script>
</body>
</html>
